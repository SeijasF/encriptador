<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Encriptador de texto</title>
    <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body>
    <header class="encabezado">
        <h1 class="encabezado__titulo">Encriptador de Texto</h1>
    </header>
    <main>
        <section class="seccionMensaje">
            <input class="seccionMensaje__input" type="text">
            <div class="seccionMensaje__contenedor">
                <p class="seccionMensaje__info">solo letras minúsculas</p>
                <button class="btn">Encriptar</button>
                <button class="btn">Desencriptar</button>
            </div>
        </section>
        <section class="seccionImagen">
            <img class="seccionImagen__img" src="/assets/img/imagen.jpg" alt="Imagen de un oso utilizando una computadora">
            <textarea class="seccionImagen__textarea" name="areaTexto" id="areaTexto"></textarea>
            <button class="btn">Copiar</button>
        </section>
    </main>
    <script src="code.js"></script>
</body>
</html>
